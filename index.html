<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>企業午餐訂餐系統｜測試版</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="loadingOverlay" class="loading-overlay hidden">
  <div class="loading-box">
    <div class="spinner"></div>
    <div id="loadingText">處理中，請稍候...</div>
  </div>
</div>
  <div id="busyOverlay" class="busy-overlay hidden">
  <div class="busy-box">
    <div class="busy-spinner"></div>
    <div id="busyText">處理中，請稍候...</div>
  </div>
</div>
<div id="confirmDialog" class="dialog-overlay hidden">
  <div class="dialog-box">
    <div class="dialog-icon">⚠️</div>
    <h3 id="dialogTitle">確認</h3>
    <p id="dialogMessage">請確認是否繼續。</p>
    <div class="dialog-actions">
      <button id="dialogCancel" class="btn ghost">返回修改</button>
      <button id="dialogConfirm" class="btn primary">確認送出</button>
    </div>
  </div>
</div>
<main class="app">
<header class="topbar">
  <div class="brand">
    <div class="logo">🍱</div>
    <div class="brand-text">
      <h1>午餐管理系統</h1>
      <span>Test V1111</span>
    </div>
  </div>

  <div class="status">
    <div id="todayText"></div>
    <strong id="systemStatusText"></strong>
  </div>
</header>
<div class="mobile-stepper">
  <div class="progress-step" data-step="verify">
    <div class="circle">1</div>
    <span>驗證</span>
  </div>

  <div class="progress-line"></div>

  <div class="progress-step" data-step="check">
    <div class="circle">2</div>
    <span>訂單</span>
  </div>

  <div class="progress-line"></div>

  <div class="progress-step" data-step="order">
    <div class="circle">3</div>
    <span>點餐</span>
  </div>

  <div class="progress-line"></div>

  <div class="progress-step" data-step="review">
    <div class="circle">4</div>
    <span>確認</span>
  </div>

  <div class="progress-line"></div>

  <div class="progress-step" data-step="done">
    <div class="circle">5</div>
    <span>完成</span>
  </div>
</div>
<section class="layout">
<aside class="steps">
  <div class="step active" data-step="scan"><span>1</span>部門 QRCode</div>
  <div class="step" data-step="verify"><span>2</span>使用者驗證</div>
  <div class="step" data-step="check"><span>3</span>今日訂單</div>
  <div class="step" data-step="order"><span>4</span>填寫訂單</div>
  <div class="step" data-step="review"><span>5</span>總覽確認</div>
  <div class="step" data-step="done"><span>6</span>完成</div>
</aside>
<section class="content">
<div id="alertBox" class="alert hidden"></div>
<section id="page-closed" class="page hidden"><h2>目前未開放訂餐</h2><p id="closedReason"></p></section>
<section id="page-scan" class="page">
  <h2>部門 QRCode</h2><p class="desc">測試版以選單模擬 QR Code 掃描。</p>
  <div class="form-grid">
    <label><span>部門</span><select id="deptSelect"><option>燃料電池生產部</option><option>工程部</option><option>品保部</option></select></label>
    <label><span>組別</span><select id="groupSelect"><option>A組</option><option>B組</option><option>C組</option></select></label>
  </div>
  <div class="actions"><button id="btnScan" class="btn primary">模擬掃描 QRCode</button><button id="btnClear" class="btn ghost">清除本機測試資料</button></div>
</section>
<section id="page-verify" class="page hidden">
  <p id="verifyDesc" class="desc">請輸入工號與姓名，系統會比對資料庫。</p>
<div id="savedUserBox" class="info-card hidden">
  <div class="row">
    <span>部門</span>
    <strong id="showDept"></strong>
  </div>
  <div class="row">
    <span>組別</span>
    <strong id="showGroup"></strong>
  </div>
  <div class="row">
    <span>工號</span>
    <strong id="showEmpId"></strong>
  </div>
  <div class="row">
    <span>姓名</span>
    <strong id="showEmpName"></strong>
  </div>
  <div class="row">
    <span>身分</span>
    <strong id="showRole"></strong>
  </div>
</div>  <div id="verifyForm" class="form-grid">
    <label><span>工號</span><input id="empId" placeholder="例如 C5454"></label>
    <label><span>姓名</span><input id="empName" placeholder="例如 KOOK"></label>
    <label><span>部門</span><input id="deptReadonly" readonly></label>
    <label><span>組別</span><input id="groupReadonly" readonly></label>
  </div>
  <div id="verifyNotice"></div><div id="verifyActions" class="actions"></div>
</section>
<section id="page-check" class="page hidden"><div id="checkBox"></div><div id="checkActions" class="actions"></div></section>
<section id="page-order" class="page hidden">
  <h2 id="orderTitle">填寫訂單</h2><div id="ruleBox"></div>
  <div class="qty-grid"><label class="qty-card meat"><span>葷食</span><input id="meatQty" type="number" min="0" value="0"><small>份</small></label><label class="qty-card veg"><span>素食</span><input id="vegQty" type="number" min="0" value="0"><small>份</small></label><label class="qty-card guest"><span>外賓</span><input id="guestQty" type="number" min="0" value="0"><small>人</small></label></div>
  <div id="orderNotice"></div><div class="actions"><button id="btnBackToCheck" class="btn ghost">返回</button><button id="btnReview" class="btn primary">下一步</button></div>
</section>
<section id="page-review" class="page hidden">
  <div class="review-hero"><div><p class="desc">按下「確認送出」後，系統才會正式儲存訂單。</p></div><span class="pill">待確認</span></div>
  <div class="two-col"><div class="panel"><div class="panel-title">👤 使用者資訊</div><div id="reviewUser"></div></div><div class="panel"><div class="panel-title">🍱 訂餐資訊</div><div id="reviewOrder"></div></div></div>
  <div class="actions split"><button id="btnEdit" class="btn ghost">← 返回修改</button><button id="btnSubmit" class="btn primary">確認送出</button></div>
</section>
<section id="page-done" class="page hidden">
  <div class="done-simple">
    <div class="hero">✅</div>
    <p>10 秒後將自動返回首頁</p>

    <div class="actions">
      <button id="btnHome" class="btn primary">回到首頁</button>
    </div>
  </div>
</section>

</section> <!-- content 結束 -->
</section> <!-- layout 結束 -->
</main>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
